name: Keep Supabase Alive

on:
  schedule:
    # Berjalan setiap hari Minggu jam 00:00 UTC
    - cron: '0 0 * * 0'
  # Memungkinkan Anda menjalankan action ini secara manual kapan saja via GitHub UI
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase Table
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/todos?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
